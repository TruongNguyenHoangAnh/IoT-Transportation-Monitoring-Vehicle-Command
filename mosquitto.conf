# ============================================================================
# mosquitto.conf - Production-Grade MQTT Broker Configuration
# TLS/SSL Configuration for SecureIoT Gateway
# ============================================================================

# ============================================================================
# NETWORK & PORTS
# ============================================================================

# TLS Listener (Primary - Secure)
# Port 8883 is IANA standard for MQTT over TLS
listener 8883
protocol mqtt
socket_keepalive false

# Disable plain TCP listener (uncomment if want to keep both for compatibility)
# listener 1883
# protocol mqtt

# ============================================================================
# TLS/SSL CONFIGURATION
# ============================================================================

# CA Certificate (for client certificate verification, optional)
cafile /etc/mosquitto/certs/ca.crt

# Server Certificate (public, signed by CA)
certfile /etc/mosquitto/certs/server.crt

# Server Private Key (SENSITIVE - must be readable only by mosquitto)
keyfile /etc/mosquitto/certs/server.key

# TLS Protocol Version (security hardening)
# Disable older, insecure versions
tls_version tlsv1.2
# Alternatively for modern clients:
# tls_version tlsv1_2 tlsv1_3

# TLS Certificate Authority - Verify client certificates (optional)
# If you want client certificate authentication:
# require_certificate true
# use_identity_as_username true

# For now, allow connections without client cert (server-only verification)
require_certificate false

# ============================================================================
# CERTIFICATE VERIFICATION & SECURITY
# ============================================================================

# Use hostname resolving for ciphers (optional, modern systems)
# tls_use_os_pem_categories

# Cipher suites (optional, intermediate suites)
# If unspecified, uses system default (usually fine)
# tls_ciphers DEFAULT:!aNULL:!eNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK

# ============================================================================
# AUTHENTICATION & ACCESS CONTROL
# ============================================================================

# Allow anonymous connections (comment out to require auth)
allow_anonymous true

# Username/password authentication file (optional)
# password_file /etc/mosquitto/passwd

# Access control file (ACL)
# acl_file /etc/mosquitto/acl.conf

# ============================================================================
# BROKER SETTINGS
# ============================================================================

# Message Broker ID
broker_id mqtt_gateway

# Max queued message bytes
max_queued_messages 1000

# Message retention settings
retain_available true
max_retained_messages 1000

# Heartbeat & Keep-alive
keepalive_interval 60

# Max client connections
max_connections -1

# ============================================================================
# LOGGING
# ============================================================================

# Log output file
log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_dest syslog

# Log types (debug output)
log_type all
log_type error
log_type warning
log_type connection
log_type subscribe
log_type unsubscribe
log_type publish

# Verbosity level (more = more detailed)
loglevel debug

# ============================================================================
# PERSISTENCE & STORAGE
# ============================================================================

# Enable message persistence
persistence true
persistence_location /var/lib/mosquitto/

# Autosave interval (seconds)
autosave_interval 1800

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# TCP backlog
max_connections -1

# Default for MQTT 3.1 / 3.1.1
protocol_trace false

# Connection timeout (seconds)
# Clients must send CONNECT frame within this time
connect_timeout 10

# ============================================================================
# WEBSOCKETS (Optional)
# ============================================================================

# WebSocket listener (if needed for web clients)
# listener 8884
# protocol websockets
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key

# ============================================================================
# CLUSTERING (Optional - For High Availability)
# ============================================================================

# Bridge configuration (optional, for multi-broker setup)
# connection bridge_name
# address remote.broker.com:8883
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/client.crt
# keyfile /etc/mosquitto/certs/client.key

# ============================================================================
# NOTES FOR DEPLOYMENT
# ============================================================================
#
# 1. File Permissions:
#    sudo chown mosquitto:mosquitto /etc/mosquitto/certs/
#    sudo chmod 640 /etc/mosquitto/certs/server.key
#    sudo chmod 644 /etc/mosquitto/certs/server.crt
#    sudo chmod 644 /etc/mosquitto/certs/ca.crt
#
# 2. Test Connection:
#    mosquitto_sub -h localhost -p 8883 \
#      --cafile /etc/mosquitto/certs/ca.crt \
#      -t test/topic
#
# 3. Check Certificate Validity:
#    openssl x509 -in /etc/mosquitto/certs/server.crt -text -noout
#
# 4. Restart Broker:
#    sudo systemctl restart mosquitto
#    sudo systemctl status mosquitto
#
# 5. Monitor Logs:
#    sudo tail -f /var/log/mosquitto/mosquitto.log
#
